#
# This configuration applies security enhancements for all containerized MDSS services:
# - Runs containers as non-root user (UID 1000, user "mdss" or "nginx")
# - Enforces read-only root filesystem (readOnlyRootFilesystem: true)
# - Disables privilege escalation and applies RuntimeDefault seccomp profile
#
# Changes required in service Dockerfiles for ROFS compatibility:
# - All MDSS services: adduser -D -u 1000 mdss, chown /app and log dirs, USER mdss
# - Integration services (supervisord): pidfile moved to /tmp/supervisord.pid;
#   the Helm chart automatically mounts emptyDir volumes at /tmp and /var/tmp
#   for any component that has readOnlyRootFilesystem: true in its securityContext
# - licensingservice: copies /app to /tmp/app at startup so license.yaml can be
#   written at runtime; EXPOSE_LOCALHOST_ENABLED and ROTATELOGS_ENABLED env vars
#   control optional startup scripts (set to "false" for ROFS environments)
# - webclient (nginx): nginx.conf is patched in the Dockerfile via sed to move
#   pid to /tmp/nginx.pid and redirect all *_temp_path directives to /tmp/;
#   the /var/cache/nginx and /var/run directories must be mounted as emptyDir
#   volumes (see webclient extraVolumes/extraVolumeMounts below)
#
# Third-party services (postgres-mdss, rabbitmq, redis):
# - These upstream images require root to start and are NOT compatible with
#   non-root / ROFS security contexts in their current form.
# - securityContext is set to null for these components to opt them out of the
#   global security context.
# - For a fully hardened deployment, replace these images with Bitnami variants
#   (bitnami/postgresql, bitnami/rabbitmq, bitnami/redis) which are built to
#   run as non-root out of the box.


mdss-common-environment:
  EXPOSE_LOCALHOST_ENABLED: "false"
  ROTATELOGS_ENABLED: "false"
  SKIP_STARTUP_CHECKS: "yes"

securityContext:
  runAsUser: 1000
  allowPrivilegeEscalation: false
  runAsNonRoot: false
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: true


mdss_components:
  # Upstream postgres image requires root; replace with bitnami/postgresql for non-root support
  postgres-mdss:
    securityContext: null
  # Upstream rabbitmq image requires root; replace with bitnami/rabbitmq for non-root support
  rabbitmq:
    securityContext: null
  # Upstream redis image requires root; replace with bitnami/redis for non-root support
  redis:
    securityContext: null
  # nginx requires writable /var/cache/nginx and /var/run at runtime; mount as emptyDir
  webclient:
    resources: null
    extraVolumes:
      nginx-cache:
        name: nginx-cache
        emptyDir: {}
      nginx-run:
        name: nginx-run
        emptyDir: {}
    extraVolumeMounts:
      - name: nginx-cache
        mountPath: /var/cache/nginx
      - name: nginx-run
        mountPath: /var/run